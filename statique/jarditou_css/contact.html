        <div>

            <!-- Texte important -->
            <h1>Accueil</h1>

        </div>

        <div>
        
            <!-- Ligne de division horizontale -->
            <hr>

        </div>

        <div>

            <!-- Paragraphe -->
            <p>* Ces zones sont obligatoires</p>

        </div>

        <div>

            <!-- Formulaire -->
            <form action="http://bienvu.net/script.php" method="get">

                <!-- Groupe de champ 1 -->
                <fieldset>

                    <!-- Légende -->
                    <legend>Vos coordonnées</legend>

                    <label for="nom">Votre nom* : </label><input type="text" name="nom" id="nom" required><br>
                    <label for="nom">Votre prénom* : </label><input type="text" name="prénom" id="prénom" required><br>

                    <br>

                    <label for="sexe1">Sexe* : </label><input type="radio" name="sexe" value="Féminin" id="sexe1" required> Féminin<input type="radio" name="sexe" value="Masculin" id="sexe2"> Masculin<br>

                    <br>

                    <label for="ddn">Date de naissance* : </label><input type="date" name="ddn" id="ddn" required><br>
                    <label for="code_postal">Code postal* : </label><input type="text" name="code_postal" id="code_postal" required><br>
                    <label for="adresse">Adresse : </label><input type="text" name="adresse" id="adresse"><br>
                    <label for="ville">Ville : </label><input type="text" name="ville" id="ville"><br>
                    <label for="email">Email* : </label><input type="text" name="email" id="email" placeholder="dave.loper@afpa.fr" required>

                </fieldset>

                <!-- Groupe de champ 2 -->
                <fieldset>

                    <!-- Légende -->
                    <legend>Votre demande</legend>

                    <label for="sujet">Sujet* : </label>
                    <select name="sujet" size="1" id="sujet" required>

                        <option value="" selected>Veuillez sélectionner un sujet</option>
                        <option value="Mes commandes">Mes commandes</option>
                        <option value="Question sur un produit">Question sur un produit</option>
                        <option value="Réclamation">Réclamation</option>
                        <option value="Autres">Autres</option>

                    </select><br>

                    <label for="votre_question">Votre question* : </label>
                    <textarea name="votre_question" id="votre_question" rows="2" required></textarea>

                </fieldset>

                <br>

                <input type="checkbox" name="accepte" value="accepte" required>* J'accepte le traitement informatique de ce formulaire<br>

                <br>

                <input type="submit" value="Envoyer">

            </form>

        </div>

        <div>

            <!-- Ligne de division horizontale -->
            <hr>

        </div>
