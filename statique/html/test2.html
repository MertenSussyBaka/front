<!DOCTYPE html>
<html lang="fr">
    <!-- En-tête avec méta-données -->
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Test 2</title>
    </head>
    <body>
        <!-- un titre -->
        <h1>Bonjour monde !</h1>
        <!-- un paragraphe -->
        <p>lorem ipsum</p>
        <!-- une image -->
        <img src="img_girl.jpg" alt="Une fille avec une veste" width="500" height="600">
        <p>
            <blockquote>Ceci est une citation.</blockquote>
            <code>exemple de code</code><br>
            <em>EMPHASE</em><br>
            <strong>texte gras</strong><br>
            <samp>littérale ?</samp>
        </p>
        <p>
            <b>GRAS GRAS GRAS</b>
            <i>italique</i>
            <u>souligné</u>
            <small>tout petit</small>
            <sup>exposant</sup>
            <sub>indice</sub>
        </p>
        <!-- une liste non ordonnée -->
        <ul>
            <li>TB</li>
            <li>DWWM</li>
            <li>CDA</li>
        </ul>
        <!-- une liste ordonnée -->
        <ol>
            <li>TB</li>
            <li>DWWM</li>
            <li>CDA</li>
        </ol>
    </body>
</html>
